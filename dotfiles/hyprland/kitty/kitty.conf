# ╔══════════════════════════════════════════════════════════════════╗
# ║  Kitty Config — Frutiger Aero                                  ║
# ║  Translucent deep blue, sky-blue accents, glass-like feel       ║
# ╚══════════════════════════════════════════════════════════════════╝

# ── Font ──────────────────────────────────────────────────────────
font_family        JetBrainsMono Nerd Font
bold_font          JetBrainsMono Nerd Font Bold
italic_font        JetBrainsMono Nerd Font Italic
bold_italic_font   JetBrainsMono Nerd Font Bold Italic
font_size          11.0

# ── Transparency & Blur ──────────────────────────────────────────
# Hyprland's compositor handles the blur; kitty just needs opacity.
background_opacity 0.82
dynamic_background_opacity yes

# ── Cursor ────────────────────────────────────────────────────────
cursor_shape               beam
cursor_beam_thickness      1.5
cursor_blink_interval      0.5
shell_integration          enabled

# ── Window ────────────────────────────────────────────────────────
window_padding_width       10 14
placement_strategy         center
hide_window_decorations    yes
confirm_os_window_close    0
remember_window_size       yes
initial_window_width       120c
initial_window_height      34c

# ── Scrollback ────────────────────────────────────────────────────
scrollback_lines           10000
wheel_scroll_multiplier    3.0

# ── Tab Bar ───────────────────────────────────────────────────────
tab_bar_edge               top
tab_bar_style              powerline
tab_powerline_style        round
tab_bar_min_tabs           2

# ── Bell ──────────────────────────────────────────────────────────
enable_audio_bell          no
visual_bell_duration       0.0

# ── URL Handling ──────────────────────────────────────────────────
url_style                  curly
detect_urls                yes

# ═══════════════════════════════════════════════════════════════════
# COLOR SCHEME — Frutiger Aero
#
# Deep ocean background, sky-blue foreground,
# accents in aqua, cyan, grass green, and warm amber.
# Designed to feel like looking through tinted glass at a bright sky.
# ═══════════════════════════════════════════════════════════════════

# ── Base ──
foreground                 #e0f2fe
background                 #081934
selection_foreground       #081934
selection_background       #7dd3fc

# ── Cursor ──
cursor                     #38bdf8
cursor_text_color          #081934

# ── URL underline ──
url_color                  #22d3ee

# ── Tab bar ──
active_tab_foreground      #ffffff
active_tab_background      #0c4a6e
inactive_tab_foreground    #94a3b8
inactive_tab_background    #0f172a
tab_bar_background         #050e1f

# ── Borders ──
active_border_color        #38bdf8
inactive_border_color      #1e3a5f

# ── Normal colors (0–7) ──
#: black
color0                     #0f172a
#: red — warm, not harsh
color1                     #f87171
#: green — Frutiger grass green
color2                     #4ade80
#: yellow — optimistic amber
color3                     #fbbf24
#: blue — core sky blue
color4                     #38bdf8
#: magenta — soft lavender-pink
color5                     #c084fc
#: cyan — aqua
color6                     #22d3ee
#: white
color7                     #e0f2fe

# ── Bright colors (8–15) ──
#: bright black (grey)
color8                     #334155
#: bright red
color9                     #fca5a5
#: bright green
color10                    #86efac
#: bright yellow
color11                    #fde68a
#: bright blue
color12                    #7dd3fc
#: bright magenta
color13                    #d8b4fe
#: bright cyan
color14                    #67e8f9
#: bright white
color15                    #f0f9ff
