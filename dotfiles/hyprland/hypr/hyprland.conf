# ╔══════════════════════════════════════════════════════════════════╗
# ║  Hyprland Config — Frutiger Aero                                ║
# ║  Sky-blue borders, deep glass blur, floating translucent feel    ║
# ║  Keybindings preserved from original i3-migrated config.         ║
# ╚══════════════════════════════════════════════════════════════════╝

xwayland {
    force_zero_scaling = true
}

# ── Monitors ──────────────────────────────────────────────────────
# 4K ASUS Monitor - Primary, Scaled 1.5x
monitor = DP-1, 3840x2160@60, 0x0, 1.5

# Ultrawide AOC Monitor - 144Hz, Positioned to the right
monitor = DP-2, 3440x1440@144, 2560x0, 1.33


###################
### MY PROGRAMS ###
###################

$terminal = kitty
$fileManager = nemo
$browser = firefox
$menu = wofi --show drun


#################
### AUTOSTART ###
#################

exec-once = dex --autostart --environment Hyprland
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = /usr/libexec/polkit-gnome-authentication-agent-1
exec-once = bash -lc 'ulimit -n 65535; exec waybar'
exec-once = waypaper --restore
exec-once = sleep 1 && /usr/libexec/xdg-desktop-portal-hyprland
exec-once = sleep 2 && /usr/libexec/xdg-desktop-portal-gtk

# Audio stack
exec-once = pipewire &
exec-once = pipewire-pulse &
exec-once = wireplumber &

# Notification daemon
exec-once = mako


#############################
### ENVIRONMENT VARIABLES ###
#############################

env = HYPRCURSOR_THEME,capitaine-cursors
env = HYPRCURSOR_SIZE,28
env = XCURSOR_THEME,capitaine-cursors
env = XCURSOR_SIZE,28

exec-once = hyprctl setcursor capitaine-cursors 28


#####################
### LOOK AND FEEL ###
#####################

general {
    gaps_in = 6
    gaps_out = 10

    border_size = 2

    # ── Frutiger Aero border colors ──
    # Active: sky blue glow
    col.active_border = rgba(38bdf8cc) rgba(22d3eecc) 45deg
    # Inactive: deep ocean translucent
    col.inactive_border = rgba(0f172a88)

    layout = dwindle
}

decoration {
    rounding = 12

    # ── Translucent windows — wallpaper bleeds through ──
    active_opacity = 0.92
    inactive_opacity = 0.85
    fullscreen_opacity = 1.0

    shadow {
        enabled = true
        range = 12
        render_power = 3
        # ── Deep blue shadow (not black) for Aero feel ──
        color = rgba(04122480)
        color_inactive = rgba(04122440)
    }

    blur {
        enabled = true
        size = 10
        passes = 4
        new_optimizations = true
        ignore_opacity = true
        # ── Extra blur settings for glassy look ──
        contrast = 1.0
        brightness = 1.0
        vibrancy = 0.2
        vibrancy_darkness = 0.0
        noise = 0.01
        popups = true
    }
}

animations {
    enabled = yes

    # Smooth, bouncy curves — like gel settling into place
    bezier = aeroSnap, 0.25, 1.0, 0.25, 1.0
    bezier = aeroSlide, 0.16, 1.0, 0.3, 1.0
    bezier = aeroPop, 0.05, 0.9, 0.1, 1.05
    bezier = aeroFade, 0.33, 0.0, 0.67, 1.0

    # Windows pop in like gel bubbles
    animation = windows, 1, 4, aeroPop, popin 80%
    animation = windowsIn, 1, 4, aeroPop, popin 80%
    animation = windowsOut, 1, 3, aeroFade, popin 80%
    animation = windowsMove, 1, 4, aeroSnap

    # Smooth fade for opacity changes
    animation = fade, 1, 4, aeroFade

    # Workspaces slide like glass panels
    animation = workspaces, 1, 4, aeroSlide, slide

    # Border color transitions
    animation = border, 1, 6, aeroFade
    animation = borderangle, 1, 30, aeroFade, loop
}

dwindle {
    pseudotile = true
    preserve_split = true
}

master {
    new_status = master
}

misc {
    force_default_wallpaper = 0
    disable_hyprland_logo = true
    # Animate manual resizes
    animate_manual_resizes = true
    # VRR (adaptive sync) for smooth animations
    vrr = 1
}


#############
### INPUT ###
#############

input {
    kb_layout = us
    follow_mouse = 1
    sensitivity = 0
    touchpad {
        natural_scroll = false
    }
}


###################
### KEYBINDINGS ###
###################

$mainMod = SUPER

# Applications (Adapted from i3)
bind = $mainMod, Return, exec, $terminal
bind = $mainMod SHIFT, F, exec, $fileManager
bind = $mainMod SHIFT, B, exec, $browser
bind = $mainMod, D, exec, $menu

bind = $mainMod, F, fullscreen

# Window Management (Adapted from i3)
bind = $mainMod, Q, killactive
bind = $mainMod SHIFT, R, exec, hyprctl reload
bind = $mainMod SHIFT, E, exit

# Orientation / Layout
bind = $mainMod, V, togglesplit
bind = $mainMod, H, pseudo

# Focus with mainMod + arrow keys
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# Switch workspaces 1-10
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 10, workspace, 10

# Move active window to a workspace 1-10
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 10, movetoworkspace, 10

# Audio Keys (Using pactl as per your i3 config)
bindel = ,XF86AudioRaiseVolume, exec, pactl set-sink-volume @DEFAULT_SINK@ +5%
bindel = ,XF86AudioLowerVolume, exec, pactl set-sink-volume @DEFAULT_SINK@ -5%

# Mouse bindings
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Neovim
bind = SUPER, N, exec, nvim

# Screenshots
bind = , Print, exec, grim -g "$(slurp)" - | wl-copy && grim -g "$(slurp)" ~/Pictures/$(date +%Y-%m-%d_%H-%m-%s).png
bind = SHIFT, Print, exec, grim - | wl-copy && grim ~/Pictures/$(date +%Y-%m-%d_%H-%m-%s).png
